# ════════════════════════════════════════════════════════════════════
# Performance Testing Scenarios Configuration
# ════════════════════════════════════════════════════════════════════
# 
# Instructions:
# 1. Copy the template below for each test scenario
# 2. Fill in your actual world/launch/person_config file names
# 3. Set start and goal poses (x, y coordinates in meters, theta in radians)
# 4. Adjust timeout based on expected completion time
#
# Note: timeout is in SECONDS
#   - Simple hallway (10m): 60-120 seconds
#   - Crowded scenarios: 120-300 seconds
#   - Complex hospital routes: 300-600 seconds
# ════════════════════════════════════════════════════════════════════

scenarios:
  # ──────────────────────────────────────────────────────────────────
  # TEMPLATE - Copy this for each new scenario
  # ──────────────────────────────────────────────────────────────────
  # - name: "SCENARIO_NAME_HERE"
  #   world: "YOUR_WORLD_FILE.world"
  #   launch: "YOUR_LAUNCH_FILE.launch.py"
  #   person_config: "YOUR_PERSON_CONFIG.yaml"
  #   start_pose:
  #     x: 0.0      # meters
  #     y: 0.0      # meters
  #     theta: 0.0  # radians (0 = facing +X axis)
  #   goal_pose:
  #     x: 10.0     # meters
  #     y: 0.0      # meters
  #     theta: 0.0  # radians
  #   timeout: 120  # seconds
  
  # ──────────────────────────────────────────────────────────────────
  # YOUR TEST SCENARIOS (add below)
